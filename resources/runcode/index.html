<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karin Terminal</title>
  <link rel="preconnect" href="https://google-fonts.mirrors.sjtug.sjtu.edu.cn">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://google-fonts.mirrors.sjtug.sjtu.edu.cn/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{pluResPath}}font/SourceCodePro/index.css">
  <link rel="stylesheet" href="{{pluResPath}}runcode/index.css">
</head>

<body>
  <div class="window">
    <!-- Title bar -->
    <div class="titlebar">
      <div class="lights">
        <span class="light light-red"></span>
        <span class="light light-yellow"></span>
        <span class="light light-green"></span>
      </div>
      <div class="titlebar-title">命令执行框</div>
      <div class="titlebar-meta">
        <span class="meta-key">⌘</span>
        <span class="meta-time">{{data.time}}</span>
      </div>
    </div>

    <!-- Command panel -->
    <div class="cmd-panel">
      <pre class="cmd-source"><span class="p-user">{{data.user}}@{{data.host}}</span><span class="p-path">:{{data.path}}{{data.symbol}} </span>{{@ data.cmd}}</pre>
      <div class="enter-key">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 10 4 15 9 20" />
          <path d="M20 4v7a4 4 0 0 1-4 4H4" />
        </svg>
      </div>
    </div>

    <!-- Output panel -->
    <div class="out-panel">
      {{if data.output.length}}
      <div class="out-lines">
        {{each data.output}}
        <div class="out-row"><span class="lt">{{@ $value}}</span></div>
        {{/each}}
      </div>
      {{else}}
      <div class="out-empty">— no output —</div>
      {{/if}}
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-name">karin-plugin-ling</span>
      <span class="footer-copy">{{sys.copyright}}</span>
    </div>
  </div>
</body>

</html>
